<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Gallery and Select Menus</title>
    <link rel="stylesheet" href="belts2.css">
</head>
<body>
    <div class="name-container">
        <h2>Enter Your Name</h2>
        <input type="text" id="nameInput" placeholder="Enter your name">
        <button type="button" onclick="verifyName()">Submit</button>
    </div>
    <div class="main-content">
        <div >Welcome, <span id ="benzii"></span></div>
    <center><h2>Image Gallery</h2></center>
<h2>CHOOSE</h2>

<center><div class="select-container">
    <form id="myForm">
        <label for="menu1">Image:</label>
        <select id="menu1">
            <option value="" disabled selected>Select an Image</option>
            <!-- Options will be added by JavaScript -->
        </select>
        <br>

        <label for="menu2">Year:</label>
        <select id="menu2">
            <option value="" disabled selected>Select Year</option>
            <!-- Options will be added by JavaScript -->
        </select>
        <br>

        <label for="menu3">Branch:</label>
        <select id="menu3">
            <option value="" disabled selected>Select Branch</option>
            <!-- Options will be added by JavaScript -->
        </select>
        <br>

        <label for="menu4">Class:</label>
        <select id="menu4">
            <option value="" disabled selected>Select Section</option>
            <!-- Options will be added by JavaScript -->
        </select>
        <br>

        <button type="button" onclick="showSelectedValues()">Show Selected Values</button>
    </form></center>
    <center><p id="imageCount">Total Images: 0</p> </center>
<div id="notfound"></div>
<div id="imageGallery"></div>
</div>
    <p id="result"></p>
</div>

<script src="favcgushfjj.js">
</script>

</body>
</html>
