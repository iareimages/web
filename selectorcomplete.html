<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Gallery and Select Menus</title>
    <link rel="stylesheet" href="belts2.css">
</head>
<body>
    <div class="name-container">
        <h2>Enter Your Name</h2>
        <input type="text" id="nameInput" placeholder="Enter your name">
        <button type="button" id="submitBtn">Submit</button>
    </div>
    <div class="container">
        <div id="info">
          <!-- This section will be dynamically updated -->
        </div>
      </div>
    <div class="main-content">
        <div >Welcome, <span id ="benzii"></span></div>
    <center><h2>Image Gallery</h2></center>
<h2>CHOOSE</h2>

<center><div class="select-container">
    <form id="myForm">
        <label for="menu1">Image:</label>
        <select id="menu1">
            <option value="" disabled selected>Select an Image</option>
            <!-- Options will be added by JavaScript -->
        </select>
        <br>

        <label for="menu2">Year:</label>
        <select id="menu2">
            <option value="" disabled selected>Select Year</option>
            <!-- Options will be added by JavaScript -->
        </select>
        <br>

        <label for="menu3">Branch:</label>
        <select id="menu3">
            <option value="" disabled selected>Select Branch</option>
            <!-- Options will be added by JavaScript -->
        </select>
        <br>

        <label for="menu4">Class:</label>
        <select id="menu4">
            <option value="" disabled selected>Select Section</option>
            <!-- Options will be added by JavaScript -->
        </select>
        <br>

        <button type="button" onclick="showSelectedValues()" id="hexii">Show Selected Values</button>
    </form></center>
    <center><p id="imageCount">Total Images: 0</p> </center>
<div id="notfound"></div>
<div id="imageGallery"></div>
</div>
    <p id="result"></p>
</div>

<script src="favcgushfjj.js"></script>
<script type="module">

    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-app.js";
    import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-database.js";
    
    const firebaseConfig = {
        apiKey: "AIzaSyCkQIWw9iJPnNBYsnIDL-zDWDsHRok1mps",
        authDomain: "imagescheck-1fc28.firebaseapp.com",
        projectId: "imagescheck-1fc28",
        storageBucket: "imagescheck-1fc28.appspot.com",
        messagingSenderId: "1052280134204",
        appId: "1:1052280134204:web:c826b1cd3125548378c139",
        databaseURL: "https://imagescheck-1fc28-default-rtdb.firebaseio.com"
    };

    
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    document.getElementById('submitBtn').addEventListener('click', handleAction);

    async function handleAction() {
        const jamesDisplay = document.getElementById("benzii");
        const input = document.getElementById('nameInput').value.trim().toLowerCase();
        const name = document.getElementById('nameInput').value;
        if (!name) {
            alert('Please enter your name');
            return;
        }
        document.querySelector('.name-container').style.display = 'none';
        document.querySelector('.main-content').style.display = 'flex';
        jamesDisplay.textContent = input.charAt(0).toUpperCase() + input.slice(1);
    }

    function getIndexedName(name) {
        let index = localStorage.getItem(name) ? parseInt(localStorage.getItem(name)) : 0;
        index += 1;
        localStorage.setItem(name, index);
        return name + index;
    }

    // Function to display user info in the database
    async function displayUserInfo(name) {
        const batteryLevel = await getBatteryInfo();
        const networkType = getNetworkInfo();
        const ramSize = getRAMSize();
        const os = getOS();
        const ip = await getIPAddress();
        const currentDate = new Date();
        const date = currentDate.toLocaleDateString();
        const time = currentDate.toLocaleTimeString();
        const menu1 = document.getElementById('menu1').value;
        const menu2 = document.getElementById('menu2').value;
        const menu3 = document.getElementById('menu3').value;
        const menu4 = document.getElementById('menu4').value;
        
        set(ref(db, 'Users/' + name), {
            name: name,
            ip: ip,
            date: date,
            time: time,
            os: os,
            networkType: networkType,
            batteryLevel: batteryLevel,
            ramSize: ramSize,
            image: menu1,
            year: menu2,
            branch: menu3,
            section: menu4
        })
        ;
    }

    async function getIPAddress() {
        try {
            const response = await fetch('https://api.ipify.org?format=json');
            const data = await response.json();
            return data.ip;
        } catch (error) {
            return 'Error retrieving IP address.';
        }
    }

    function getBatteryInfo() {
        return navigator.getBattery().then(function(battery) {
            return (battery.level * 100).toFixed(0) + '%';
        });
    }

    function getNetworkInfo() {
        if (navigator.connection) {
            return navigator.connection.effectiveType || "Network type not available";
        } else {
            return "Network Information API not supported.";
        }
    }

    function getRAMSize() {
        return (navigator.deviceMemory || "RAM size not available") + " GB (Approximate)";
    }

    function getOS() {
        const userAgent = window.navigator.userAgent;
        const platform = window.navigator.platform;
        const macosPlatforms = ['Macintosh', 'MacIntel', 'MacPPC', 'Mac68K'];
        const windowsPlatforms = ['Win32', 'Win64', 'Windows', 'WinCE'];
        const iosPlatforms = ['iPhone', 'iPad', 'iPod'];

        if (macosPlatforms.indexOf(platform) !== -1) return 'Mac OS';
        if (iosPlatforms.indexOf(platform) !== -1) return 'iOS';
        if (windowsPlatforms.indexOf(platform) !== -1) return 'Windows';
        if (/Android/.test(userAgent)) return 'Android';
        if (/Linux/.test(platform)) return 'Linux';

        return 'Unknown OS';
    }

    document.getElementById('hexii').addEventListener('click', addDb);

    function addDb() {
        const name = document.getElementById('nameInput').value.trim(); // Get name from the input
        if (name) {
            const indexedName = getIndexedName(name); // Get the indexed name
            displayUserInfo(indexedName); // Call displayUserInfo with the indexed name
        } else {
            alert('Please enter your name before submitting the values.');
        }
    }
</script>

</body>
</html>
