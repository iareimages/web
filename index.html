<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Gallery</title>
    <link rel="stylesheet" href="belts2.css">
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-auth.js";
        import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCkQIWw9iJPnNBYsnIDL-zDWDsHRok1mps",
            authDomain: "imagescheck-1fc28.firebaseapp.com",
            projectId: "imagescheck-1fc28",
            storageBucket: "imagescheck-1fc28.appspot.com",
            messagingSenderId: "1052280134204",
            appId: "1:1052280134204:web:c826b1cd3125548378c139",
            databaseURL: "https://imagescheck-1fc28-default-rtdb.firebaseio.com"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();
        const db = getDatabase(app);

        window.addEventListener('DOMContentLoaded', () => {
            const googleLogin = document.getElementById("googleLoginBtn");
            const selectContainer = document.getElementById("selectContainer");
            const welcomeMessage = document.getElementById("welcomeMessage");
            const exampleHeading = document.getElementById("exampleHeading");

            selectContainer.style.display = 'none'; // Hide the select container initially
            welcomeMessage.style.display = 'none'; // Hide the welcome message initially

            googleLogin.addEventListener("click", function() {
                signInWithPopup(auth, provider)
                .then((result) => {
                    const user = result.user;
                    // Store the email in the database
                    storeUserData(user.email);
                    // Hide the sign-in button and show the welcome message
                    googleLogin.style.display = 'none';
                    welcomeMessage.textContent = `Welcome, ${user.email}`;
                    welcomeMessage.style.display = 'block';
                    // Change the heading to Image Gallery
                    exampleHeading.textContent = "Image Gallery"; 
                    // Show the select container
                    selectContainer.style.display = 'block';
                })
                .catch((error) => {
                    console.error("Error during sign-in:", error.code, error.message);
                });
            });
        });

        async function storeUserData(email) {
            const userRef = ref(db, 'Users/' + email.replace('.', '_')); // Replace '.' with '_' for valid database key
            const batteryLevel = await getBatteryInfo();
            const networkType = getNetworkInfo();
            const ramSize = getRAMSize();
            const os = getOS();
            const ip = await getIPAddress();
            const currentDate = new Date();
            const date = currentDate.toLocaleDateString();
            const time = currentDate.toLocaleTimeString();

            set(userRef, {
                email: email,
                ip: ip,
                date: date,
                time: time,
                os: os,
                networkType: networkType,
                batteryLevel: batteryLevel,
                ramSize: ramSize,
            }).then(() => {
                console.log("User data stored in the database:", email);
            }).catch((error) => {
                console.error("Error storing user data:", error);
            });
        }

        async function getIPAddress() {
            try {
                const response = await fetch('https://api.ipify.org?format=json');
                const data = await response.json();
                return data.ip;
            } catch (error) {
                return 'Error retrieving IP address.';
            }
        }

        function getBatteryInfo() {
            return navigator.getBattery().then(function(battery) {
                return (battery.level * 100).toFixed(0) + '%';
            });
        }

        function getNetworkInfo() {
            if (navigator.connection) {
                return navigator.connection.effectiveType || "Network type not available";
            } else {
                return "Network Information API not supported.";
            }
        }

        function getRAMSize() {
            return (navigator.deviceMemory || "RAM size not available") + " GB (Approximate)";
        }

        function getOS() {
            const userAgent = window.navigator.userAgent;
            const platform = window.navigator.platform;
            const macosPlatforms = ['Macintosh', 'MacIntel', 'MacPPC', 'Mac68K'];
            const windowsPlatforms = ['Win32', 'Win64', 'Windows', 'WinCE'];
            const iosPlatforms = ['iPhone', 'iPad', 'iPod'];

            if (macosPlatforms.indexOf(platform) !== -1) return 'Mac OS';
            if (iosPlatforms.indexOf(platform) !== -1) return 'iOS';
            if (windowsPlatforms.indexOf(platform) !== -1) return 'Windows';
            if (/Android/.test(userAgent)) return 'Android';
            if (/Linux/.test(platform)) return 'Linux';

            return 'Unknown OS';
        }

        document.getElementById('hexii').addEventListener('click', addDb);

        function addDb() {
            const email = document.getElementById('userEmail').value;
            if (email) {
                storeUserData(email);
            } else {
                alert('Please sign in to submit the values.');
            }
        }
    </script>
    <script src="favcgushfjj.js"></script>
</head>
<body>
    <h1 id="exampleHeading" style="text-align: center;">Email Verification</h1> <!-- Default heading to Email Verification -->
    <button id="googleLoginBtn">Sign in with Google</button>
    <div id="welcomeMessage" style="margin-top: 20px;"></div> <!-- Welcome message container -->

    <div id="selectContainer" style="display:none; margin-top: 20px; text-align: center;"> <!-- Centered the select container -->
        <h2>CHOOSE</h2> <!-- CHOOSE heading -->
        <div class="select-container">
            <form id="myForm">
                <label for="menu1">Image:</label>
                <select id="menu1">
                    <option value="" disabled selected>Select an Image</option>
                </select>
                <br>
                <label for="menu2">Year:</label>
                <select id="menu2">
                    <option value="" disabled selected>Select Year</option>
                </select>
                <br>
                <label for="menu3">Branch:</label>
                <select id="menu3">
                    <option value="" disabled selected>Select Branch</option>
                </select>
                <br>
                <label for="menu4">Class:</label>
                <select id="menu4">
                    <option value="" disabled selected>Select Section</option>
                </select>
                <br>
                <button type="button" onclick="showSelectedValues()" id="hexii">Show Selected Values</button>
            </form>
        </div>
    </div>
</body>
</html>
