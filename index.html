<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Sign-In Example</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCkQIWw9iJPnNBYsnIDL-zDWDsHRok1mps",
            authDomain: "imagescheck-1fc28.firebaseapp.com",
            projectId: "imagescheck-1fc28",
            storageBucket: "imagescheck-1fc28.appspot.com",
            messagingSenderId: "1052280134204",
            appId: "1:1052280134204:web:c826b1cd3125548378c139"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        window.addEventListener('DOMContentLoaded', () => {
            const googleLogin = document.getElementById("googleLoginBtn");
            const userInfoDisplay = document.getElementById("userInfoDisplay");

            googleLogin.addEventListener("click", function() {
                signInWithPopup(auth, provider)
                .then((result) => {
                    const user = result.user;
                    userInfoDisplay.innerHTML = `Welcome, ${user.displayName}!<br>Your email address is: ${user.email}`;
                    userInfoDisplay.style.display = 'block';
                })
                .catch((error) => {
                    console.error("Error during sign-in:", error.code, error.message);
                });
            });
        });
    </script>
</head>
<body>
    <h1>Google Sign-In Example</h1>
    <button id="googleLoginBtn">Sign in with Google</button>
    <div id="userInfoDisplay" style="display:none; margin-top: 20px; font-size: 18px; font-weight: bold;"></div>
</body>
</html>
